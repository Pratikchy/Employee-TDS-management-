<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | TDS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-glow {
            box-shadow: 0 0 50px -10px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-800 dark:text-slate-200 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center space-y-8 animate-fade-in">
        <!-- Icon -->
        <div class="relative inline-block">
            <div class="w-32 h-32 bg-blue-600/10 rounded-3xl flex items-center justify-center border border-blue-500/20 mx-auto error-glow">
                <i data-lucide="ghost" class="w-16 h-16 text-blue-500 animate-bounce"></i>
            </div>
            <div class="absolute -top-2 -right-2 bg-red-500 text-slate-900 dark:text-white text-xs font-bold px-2 py-1 rounded-lg">404</div>
        </div>

        <!-- Content -->
        <div class="glass-card p-10 relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 rounded-full -mr-16 -mt-16 blur-3xl group-hover:bg-blue-500/10 transition-colors"></div>
            
            <h1 class="text-6xl font-black text-slate-900 dark:text-white mb-2 tracking-tighter">Oops!</h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg mb-8 font-medium">The page you're looking for has vanished into thin air.</p>
            
            <div class="space-y-4">
                <button onclick="redirectToDashboard()" class="w-full btn-primary py-4 text-lg">
                    <i data-lucide="home" class="w-5 h-5 mr-3 group-hover:scale-110 transition-transform"></i>
                    Back to Safety
                </button>
                
                <button onclick="window.history.back()" class="w-full btn-ghost py-4 text-lg border border-slate-300 dark:border-slate-700">
                    <i data-lucide="arrow-left" class="w-5 h-5 mr-3 group-hover:-translate-x-1 transition-transform"></i>
                    Go Back
                </button>
            </div>
        </div>

        <!-- Footer Info -->
        <p class="text-slate-500 text-sm font-medium">
            Lost? Contact <a href="mailto:support@tdsportal.com" class="text-blue-500 hover:underline">Support</a>
        </p>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();

        function redirectToDashboard() {
            const user = TDS_PORTAL.session.getUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const routes = {
                'ADMIN': 'admin-dashboard.html',
                'HR': 'hr-dashboard.html',
                'EMPLOYEE': 'employee-dashboard.html'
            };

            window.location.href = routes[user.role] || 'index.html';
        }
    </script>
</body>
</html>
